<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Start-MLLM</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="从零开始学习多模态大模型">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0f766e;
    }

    .app-name-link img {
      display: none;
    }

    .markdown-section {
      max-width: 960px;
    }

    .cover-main > p:last-child a:last-child {
      background-color: var(--theme-color);
      border-color: var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app">Start-MLLM 正在加载...</div>
  <script>
    window.$docsify = {
      name: 'Start-MLLM',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      relativePath: false,
      search: {
        placeholder: '搜索章节',
        noData: '没有找到结果',
      },
      mermaidConfig: {
        startOnLoad: true
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
</body>
</html>
