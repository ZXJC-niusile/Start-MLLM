<defs><marker id="m-2B63D9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2B63D9"/></marker><marker id="m-2D8C6C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2D8C6C"/></marker><marker id="m-B7791F" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#B7791F"/></marker><marker id="m-C0563D" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#C0563D"/></marker><marker id="m-5B6B7A" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5B6B7A"/></marker></defs>
<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">多模态 Agent 工作流</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">第九章的重点：让感知、规划、工具和记忆形成闭环，而不是一次性把图扔给模型。</text><g><rect x="55" y="255" width="180" height="110" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="73" y="285" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">用户输入</text><text x="73" y="311" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">文本 + 图片 / 文档 / 截图</text></g><g><rect x="295" y="165" width="220" height="110" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="313" y="195" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">感知模块</text><text x="313" y="221" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">摘要图像，提取字段</text><text x="313" y="241" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">识别关键视觉证据</text></g><g><rect x="295" y="345" width="220" height="110" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="313" y="375" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">记忆模块</text><text x="313" y="401" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">保存摘要、历史偏好</text><text x="313" y="421" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">维持多轮上下文</text></g><g><rect x="575" y="255" width="220" height="110" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="593" y="285" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">规划模块</text><text x="593" y="311" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">决定：直接回答？</text><text x="593" y="331" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">还是继续调工具？</text></g><g><rect x="855" y="165" width="230" height="110" rx="16" fill="#FFF0EC" stroke="#CBD5E1" stroke-width="1.5"/><text x="873" y="195" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">工具模块</text><text x="873" y="221" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">OCR / 检索 / 规则校验</text><text x="873" y="241" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">裁剪、解析、结构化</text></g><g><rect x="855" y="345" width="230" height="110" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="873" y="375" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">结果汇总</text><text x="873" y="401" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结合用户目标、感知结果、工具输出</text><text x="873" y="421" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">生成最终回答或动作建议</text></g><g><rect x="1145" y="255" width="90" height="110" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1163" y="285" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">输出</text><text x="1163" y="311" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">答案 / 动作</text></g><line x1="235" y1="310" x2="295" y2="220" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="235" y1="310" x2="295" y2="400" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="515" y1="220" x2="575" y2="310" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="515" y1="400" x2="575" y2="310" stroke="#5B6B7A" stroke-width="3" stroke-linecap="round" marker-end="url(#m-5B6B7A)"/><line x1="795" y1="310" x2="855" y2="220" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="1085" y1="220" x2="1085" y2="345" stroke="#5B6B7A" stroke-width="3" stroke-linecap="round" marker-end="url(#m-5B6B7A)"/><line x1="1085" y1="400" x2="1145" y2="310" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><g><rect x="75" y="540" width="1115" height="125" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="93" y="570" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">落地提醒</text><text x="93" y="596" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">稳定系统通常不是“一个 VLM 包打一切”，而是 VLM + OCR + 检索 + 规则层的组合。</text><text x="93" y="616" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">感知失败时要有降级路径：重传、换工具、人工确认，别把不确定答案伪装成确定。</text></g>
</svg>