<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">Start-MLLM 学习路线总览</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">从概念地图到 Demo 与 Agent，把教程主线压缩成一张图。</text><g><rect x="50" y="140" width="220" height="122" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="68" y="170" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">01 概念地图</text><text x="68" y="196" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">模态、任务版图、</text><text x="68" y="216" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">系统主链路、能力边界</text></g><g><rect x="290" y="140" width="220" height="122" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="308" y="170" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">02 视觉与对齐</text><text x="308" y="196" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">patch token、ViT、</text><text x="308" y="216" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">CLIP 与跨模态对齐</text></g><g><rect x="530" y="140" width="220" height="122" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="548" y="170" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">03 生成架构</text><text x="548" y="196" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">双塔、Connector + LLM、</text><text x="548" y="216" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">统一建模三条路线</text></g><g><rect x="770" y="140" width="220" height="122" rx="16" fill="#FFF0EC" stroke="#CBD5E1" stroke-width="1.5"/><text x="788" y="170" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">04 数据训练</text><text x="788" y="196" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">JSONL、训练流程、</text><text x="788" y="216" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">LoRA/QLoRA 与数据配方</text></g><g><rect x="1010" y="140" width="220" height="122" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1028" y="170" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">05 评测部署</text><text x="1028" y="196" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">评测矩阵、Serving、</text><text x="1028" y="216" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">链路观测与资源规划</text></g><line x1="270" y1="201" x2="290" y2="201" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="510" y1="201" x2="530" y2="201" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="750" y1="201" x2="770" y2="201" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="990" y1="201" x2="1010" y2="201" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><g><rect x="170" y="340" width="250" height="134" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="188" y="370" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">06 跑通第一个 VLM</text><text x="188" y="396" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">本地 Transformers 或</text><text x="188" y="416" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">OpenAI 兼容接口图文问答</text></g><g><rect x="510" y="340" width="250" height="134" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="528" y="370" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">07 构建 Demo</text><text x="528" y="396" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">把脚本变成交互界面，</text><text x="528" y="416" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">形成可展示的应用雏形</text></g><g><rect x="850" y="340" width="250" height="134" rx="16" fill="#FFF0EC" stroke="#CBD5E1" stroke-width="1.5"/><text x="868" y="370" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">08 多模态 Agent</text><text x="868" y="396" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">把感知、规划、工具、</text><text x="868" y="416" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">记忆串成更真实工作流</text></g><line x1="1115" y1="262" x2="975" y2="340" stroke="#5B6B7A" stroke-width="3" stroke-linecap="round" marker-end="url(#m-5B6B7A)"/><line x1="760" y1="407" x2="850" y2="407" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="420" y1="407" x2="510" y2="407" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><g><rect x="70" y="540" width="1140" height="150" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="88" y="570" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">阅读建议</text><text x="88" y="596" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">先读懂地图，再理解视觉与架构；随后用评测和部署建立工程判断，最后亲手跑通脚本、Demo 与 Agent。</text><text x="88" y="616" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">每往后一章，都尽量留下一份可运行产物：JSONL、评测结果、脚本、界面或工作流。</text></g>
</svg>