<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
<defs><marker id="m-2B63D9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2B63D9"/></marker><marker id="m-2D8C6C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2D8C6C"/></marker><marker id="m-B7791F" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#B7791F"/></marker><marker id="m-C0563D" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#C0563D"/></marker><marker id="m-5B6B7A" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5B6B7A"/></marker></defs>
<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">多模态评测维度矩阵</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">第五章最关键的不是排行榜，而是知道模型应该从哪些维度被验收。</text><g><rect x="55" y="180" width="220" height="120" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="73" y="210" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">感知能力</text><text x="73" y="236" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">对象、关系、场景</text><text x="73" y="256" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">基础看图是否稳定</text></g><g><rect x="295" y="180" width="220" height="120" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="313" y="210" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">OCR / 文档</text><text x="313" y="236" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">截图、票据、表格、公式</text><text x="313" y="256" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">小字与版面理解</text></g><g><rect x="535" y="180" width="220" height="120" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="553" y="210" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">推理能力</text><text x="553" y="236" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">比较、排序、图表</text><text x="553" y="256" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">多步问题稳定性</text></g><g><rect x="775" y="180" width="220" height="120" rx="16" fill="#FFF0EC" stroke="#CBD5E1" stroke-width="1.5"/><text x="793" y="210" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">幻觉控制</text><text x="793" y="236" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">看不到却乱答</text><text x="793" y="256" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">图文矛盾是否能识别</text></g><g><rect x="1015" y="180" width="210" height="120" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1033" y="210" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">工程成本</text><text x="1033" y="236" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">延迟、显存、吞吐</text><text x="1033" y="256" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">接口与部署难度</text></g><g><rect x="80" y="365" width="1120" height="270" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="98" y="395" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">怎么用这张矩阵？</text><text x="98" y="421" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">1. 先用真实业务场景构造小评测集，而不是只看公开 benchmark 排名。</text><text x="98" y="441" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">2. 用 tags 把样本归到一到两个维度里，再按维度看失败率。</text><text x="98" y="461" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">3. 优先分析失败模式：漏看小字、混淆对象、图表算错、无证据乱答、延迟过高。</text><text x="98" y="481" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">4. 最后把离线评测结果和第六章的部署观测连起来，形成完整工程判断。</text></g>
</svg>