<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
<defs><marker id="m-2B63D9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2B63D9"/></marker><marker id="m-2D8C6C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2D8C6C"/></marker><marker id="m-B7791F" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#B7791F"/></marker><marker id="m-C0563D" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#C0563D"/></marker><marker id="m-5B6B7A" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5B6B7A"/></marker></defs>
<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">像素 -&gt; Patch -&gt; Token</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">第二章最重要的工程直觉：token 粒度决定你能看多细，也决定你要付出多少算力。</text><g><rect x="70" y="165" width="230" height="230" rx="18" fill="#F7DDB9" stroke="#E0B97F" stroke-width="1.5"/><rect x="96" y="195" width="78" height="34" rx="8" fill="#FFF"/><rect x="96" y="245" width="170" height="14" rx="7" fill="#FFF2DC"/><rect x="96" y="269" width="150" height="14" rx="7" fill="#FFF2DC"/><rect x="96" y="293" width="100" height="14" rx="7" fill="#FFF2DC"/><circle cx="250" cy="335" r="16" fill="#D97757"/><text x="70" y="430" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">原始图像</text><text x="70" y="454" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">包含小字、边角、按钮、版面结构</text></g><g><rect x="390" y="150" width="340" height="260" rx="18" fill="#FFF" stroke="#CBD5E1" stroke-width="1.5"/><line x1="425" y1="175" x2="425" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="467" y1="175" x2="467" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="509" y1="175" x2="509" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="551" y1="175" x2="551" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="593" y1="175" x2="593" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="635" y1="175" x2="635" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="677" y1="175" x2="677" y2="385" stroke="#D8E0EA" stroke-width="1.5"/><line x1="415" y1="205" x2="705" y2="205" stroke="#D8E0EA" stroke-width="1.5"/><line x1="415" y1="247" x2="705" y2="247" stroke="#D8E0EA" stroke-width="1.5"/><line x1="415" y1="289" x2="705" y2="289" stroke="#D8E0EA" stroke-width="1.5"/><line x1="415" y1="331" x2="705" y2="331" stroke="#D8E0EA" stroke-width="1.5"/><line x1="415" y1="373" x2="705" y2="373" stroke="#D8E0EA" stroke-width="1.5"/><rect x="509" y="217" width="42" height="42" fill="#FFE5B6"/><rect x="593" y="301" width="42" height="42" fill="#D5F0E3"/><text x="390" y="430" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">Patch 切分</text><text x="390" y="454" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">固定窗口把图像切成一块块局部区域</text></g><g><rect x="820" y="165" width="390" height="230" rx="18" fill="#EEF4FF" stroke="#C6D7F4" stroke-width="1.5"/><rect x="855" y="193" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.2"/><rect x="855" y="215" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.26"/><rect x="855" y="237" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.32"/><rect x="855" y="259" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.38"/><rect x="855" y="281" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.44"/><rect x="855" y="303" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.5"/><rect x="855" y="325" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.56"/><rect x="855" y="347" width="210" height="12" rx="6" fill="#2B63D9" opacity="0.62"/><rect x="1080" y="193" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.2"/><rect x="1080" y="215" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.26"/><rect x="1080" y="237" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.32"/><rect x="1080" y="259" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.38"/><rect x="1080" y="281" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.44"/><rect x="1080" y="303" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.5"/><rect x="1080" y="325" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.56"/><rect x="1080" y="347" width="85" height="12" rx="6" fill="#2D8C6C" opacity="0.62"/><text x="820" y="430" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">视觉 Token 序列</text><text x="820" y="454" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">粒度越细，越有利于 OCR、表格与细节定位</text></g><line x1="300" y1="280" x2="390" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="730" y1="280" x2="820" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><g><rect x="70" y="520" width="1140" height="160" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="88" y="550" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">工程折中</text><text x="88" y="576" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">低分辨率 / 大 patch：更快、更省显存，但更容易漏掉小字、表格和边角关键信息。</text><text x="88" y="596" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">高分辨率 / 更多 token：更稳，但计算、时延和显存成本会明显上升。</text><text x="88" y="616" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">所以真实系统常会在“分辨率、切块、动态裁剪、tile 策略”之间做折中。</text></g>
</svg>