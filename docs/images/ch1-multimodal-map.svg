<defs><marker id="m-2B63D9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2B63D9"/></marker><marker id="m-2D8C6C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2D8C6C"/></marker><marker id="m-B7791F" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#B7791F"/></marker><marker id="m-C0563D" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#C0563D"/></marker><marker id="m-5B6B7A" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5B6B7A"/></marker></defs>
<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">多模态系统主链路</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">第一章的核心不是背名词，而是记住信息如何从输入一路走到输出。</text><g><rect x="45" y="215" width="180" height="130" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="63" y="245" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">输入</text><text x="63" y="271" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">图像 / 截图 / 文档</text><text x="63" y="291" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">用户问题 / 指令</text></g><g><rect x="275" y="215" width="190" height="130" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="293" y="245" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">视觉编码器</text><text x="293" y="271" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">把像素转成视觉 token</text><text x="293" y="291" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">保留局部语义与结构</text></g><g><rect x="515" y="215" width="190" height="130" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="533" y="245" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">对齐层</text><text x="533" y="271" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">把视觉特征映射到</text><text x="533" y="291" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">LLM 可消费的表示</text></g><g><rect x="755" y="215" width="190" height="130" rx="16" fill="#FFF0EC" stroke="#CBD5E1" stroke-width="1.5"/><text x="773" y="245" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">语言模型</text><text x="773" y="271" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结合文本上下文</text><text x="773" y="291" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">推理并组织回答</text></g><g><rect x="995" y="215" width="230" height="130" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1013" y="245" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">输出</text><text x="1013" y="271" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">自然语言答案</text><text x="1013" y="291" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结构化结果 / 动作计划</text></g><line x1="225" y1="280" x2="275" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="465" y1="280" x2="515" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="705" y1="280" x2="755" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><line x1="945" y1="280" x2="995" y2="280" stroke="#2B63D9" stroke-width="3" stroke-linecap="round" marker-end="url(#m-2B63D9)"/><g><rect x="70" y="420" width="1140" height="220" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="88" y="450" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">你真正该记住什么？</text><text x="88" y="476" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">1. 视觉编码器决定“看没看进来”；对齐层决定“LLM 能不能读懂”。</text><text x="88" y="496" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">2. 同一个模型答不好，不一定是 LLM 弱，也可能是分辨率、裁剪、对齐或输入协议先丢了信息。</text><text x="88" y="516" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">3. 后面第二章讲“为什么会丢细节”，第三章讲“怎么接到 LLM 上做生成”，第五章讲“如何用评测把问题抓出来”。</text></g>
</svg>