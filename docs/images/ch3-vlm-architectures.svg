<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
<defs><marker id="m-2B63D9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2B63D9"/></marker><marker id="m-2D8C6C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2D8C6C"/></marker><marker id="m-B7791F" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#B7791F"/></marker><marker id="m-C0563D" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#C0563D"/></marker><marker id="m-5B6B7A" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5B6B7A"/></marker></defs>
<rect width="1280" height="760" fill="#F8FAFC"/>
<rect x="20" y="20" width="1240" height="720" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="50" y="70" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="800" fill="#213547" text-anchor="start">三种主流 VLM 架构路线</text><text x="50" y="100" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="400" fill="#5B6B7A" text-anchor="start">第三章不是背模型谱系，而是建立“结构意识”：不同路线到底擅长什么。</text><g><rect x="55" y="165" width="365" height="360" rx="16" fill="#EAF1FF" stroke="#CBD5E1" stroke-width="1.5"/><text x="73" y="195" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">路线 1：双塔检索式</text><text x="73" y="221" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结构：图像塔 + 文本塔</text><text x="73" y="241" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">强项：图文匹配、检索、排序</text><text x="73" y="261" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">优点：快、稳、部署简单</text><text x="73" y="281" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">局限：不擅长开放式生成</text></g><g><rect x="458" y="165" width="365" height="360" rx="16" fill="#EAF8F1" stroke="#CBD5E1" stroke-width="1.5"/><text x="476" y="195" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">路线 2：Connector + LLM</text><text x="476" y="221" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结构：视觉编码器 -&gt; Connector -&gt; LLM</text><text x="476" y="241" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">强项：图文问答、截图分析、文档助手</text><text x="476" y="261" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">优点：最容易工程化，能复用成熟 VLM / LLM</text><text x="476" y="281" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">局限：效果高度依赖对齐与数据配方</text></g><g><rect x="861" y="165" width="365" height="360" rx="16" fill="#FFF6E5" stroke="#CBD5E1" stroke-width="1.5"/><text x="879" y="195" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">路线 3：统一序列建模</text><text x="879" y="221" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">结构：多模态统一成 token 序列共同建模</text><text x="879" y="241" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">强项：统一扩展到图像、文本、音频、视频</text><text x="879" y="261" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">优点：理论上最统一</text><text x="879" y="281" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">局限：训练成本与系统复杂度都更高</text></g><g><rect x="90" y="575" width="1100" height="120" rx="16" fill="#F3F6F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="108" y="605" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#213547" text-anchor="start">怎么快速选？</text><text x="108" y="631" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="400" fill="#5B6B7A" text-anchor="start">检索 / 召回 / 相似度排序 -&gt; 双塔；图文问答 / 文档助手 -&gt; Connector + LLM；资源充足、做平台级系统 -&gt; 再考虑统一建模。</text></g>
</svg>